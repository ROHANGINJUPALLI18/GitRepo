version: "3.8"

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gitrepomind-backend
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      QUADRANT_URL: ${QUADRANT_URL}
      QUADRANT_API_KEY: ${QUADRANT_API_KEY}
      OLLAMA_HOST: http://host.docker.internal:11434
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: gitrepomind-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped