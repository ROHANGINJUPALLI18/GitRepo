services:
  - type: web
    name: gitrepomind-backend
    runtime: python
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: OLLAMA_HOST
        sync: false
      - key: OLLAMA_MODEL
        value: qwen2.5-coder:7b
      - key: OPENAI_API_KEY
        sync: false